name: Extract AWOS Zip and commit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure unzip is available
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: List current app directory
        run: ls -la app || true

      - name: Unzip AWOS-Phase1.zip into app/
        run: |
          if [ -f "app/AWOS-Phase1.zip" ]; then
            unzip -o app/AWOS-Phase1.zip -d app/
          else
            echo "app/AWOS-Phase1.zip not found" && exit 1
          fi

      - name: Show extracted files
        run: ls -la app/AWOS-Phase1 || true

      - name: Commit and push extracted files to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/AWOS-Phase1 || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract AWOS-Phase1.zip into app/AWOS-Phase1"
            git push origin HEAD:main
          fi
